name: Build and publish Docker image

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    uses: ./.github/workflows/test.yml

  docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Full history is required: scripts/buildPages.mjs walks the git
          # log to generate the contributors list. It only reads commit
          # metadata (hash/author/date/message), never blob content, so a
          # blobless clone keeps the full commit graph while skipping the
          # ~180MB of historical file content - checkout then fetches only
          # the blobs needed for the HEAD tree on demand.
          fetch-depth: 0
          filter: blob:none

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Skip the provenance attestation manifest - it triggers an extra
          # build step and multi-manifest push that this single-arch image
          # doesn't need.
          provenance: false

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          # Scan by digest so this is always the image that was just pushed,
          # regardless of which tags (latest / semver / sha) applied above.
          image-ref: ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload scan results to the Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Redeploy on Zeabur
        # Only master pushes update the `latest` tag (see enable={{is_default_branch}}
        # above), and Zeabur's dashboard/CLI "restart" reuses the node's cached
        # image instead of re-pulling `latest`. This service is a prebuilt
        # (Docker image) service with no GitHub repo bound, so `service redeploy`
        # (in-place redeploy) is rejected — `service update tag` is the
        # supported way to force a fresh pull for image-based services.
        if: github.ref == 'refs/heads/master'
        env:
          ZEABUR_TOKEN: ${{ secrets.ZEABUR_TOKEN }}
        run: |
          npx zeabur@latest service update tag \
            --id 6a523e43723d6cf6efaf71ea \
            --env-id 6a523e34104975fcb4676271 \
            --tag latest \
            -y -i=false
