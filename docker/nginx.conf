server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Pages are linked without the .html extension (e.g. /gallery, /about),
    # matching the "Exclude .html extension" behavior used for local hosting
    # and the webpack dev server's historyApiFallback rewrite.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location ~* \.(?:css|js|png|jpe?g|gif|svg|woff2?|ttf|eot|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }
}
