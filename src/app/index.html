<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0">
    <meta property="og:title" content="Simulator - Ray Optics Simulation">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://phydemo.app/ray-optics/">
    <meta property="og:image" content="https://phydemo.app/ray-optics/img/image.png">
    <meta property="og:description" content="A free, open-source web app for creating and simulating 2D geometric optical scenes.">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">

    <title>Simulator - Ray Optics Simulation</title>
    <link rel="canonical" href="https://phydemo.app/ray-optics/simulator/">
    <link rel="icon" href="../img/icon.png" type="image/png">
    <link rel="manifest" href="./manifest/manifest.json">
    <link rel="apple-touch-icon" href="../img/icon.png">

  </head>
  <body style="background-color: black; margin: 0;">
    <!-- The temporary welcome message wrapper. The welcome element will be moved into the vue component when ready. -->
    <div id="welcome-wrapper">
      <div id="welcome" style="position:absolute; top: calc(50% + 34px); left: 0; width: 100%; transform: translate(0%, -50%); z-index: -3; color:rgba(255,255,255,0.5); font-size:12pt; text-align:center; line-height:2; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', 'Liberation Sans', sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji';">
        <div id="welcome_title" style="font-size:22pt">Welcome to Ray Optics Simulation</div>
        <div id="welcome_instruction">You need to enable JavaScript to run this app.</div>
        <div id="welcome_loading" style="display:none"></div>
      </div>
    </div>
    <script>
      // The strings for the welcome message is handled separately here, rather than in the main bundle to reduce the initial load time.
      // The locale data is to be generated by scripts/buildInlineLocaleData.mjs and injected by Webpack during the build process.
  
      var localeData = { /* LOCALE DATA */ };

      var lang = 'en';
      var url_lang = location.search.substr(1);
      // Only ever adopt one of localeData's own (locally-authored, build-time) keys: `lang`
      // is assigned from the loop's own enumeration, never directly from url_lang/location.search.
      var url_lang_matched = false;
      for (var candidateLang in localeData) {
        if (candidateLang === url_lang) {
          lang = candidateLang;
          url_lang_matched = true;
          break;
        }
      }
      if (!url_lang_matched && navigator.language) {
        var browser_lang = navigator.language
        if (browser_lang.includes('-')) {
          browser_lang = browser_lang.split('-')[0].toLowerCase() + '-' + browser_lang.split('-')[1].toUpperCase();
        } else {
          browser_lang = browser_lang.toLowerCase();
        }

        if (browser_lang == 'zh-TW' || browser_lang == 'zh-HK' || browser_lang.startsWith('zh-HANT')) {
          lang = 'zh-TW';
        } else {
          if (localeData[browser_lang]) {
            lang = browser_lang;
          } else {
            for (var key in localeData) {
              if (browser_lang.startsWith(key.substring(0, 2))) {
                lang = key;
                break;
              }
            }
          }
        }
      }

      // Built via DOM APIs (textContent / createElement) rather than innerHTML so that
      // none of the locale-sourced text (reachable, via the lang/url_lang selection above,
      // from location.search) is ever reinterpreted as markup.
      var route = (localeData[lang].route !== undefined) ? localeData[lang].route : '/' + lang;
      document.getElementById("welcome_title").textContent = (localeData[lang].welcome && localeData[lang].welcome.title) || localeData.en.welcome.title;

      var instructionEl = document.getElementById("welcome_instruction");
      while (instructionEl.firstChild) {
        instructionEl.removeChild(instructionEl.firstChild);
      }
      var instructionText = (localeData[lang].welcome && localeData[lang].welcome.instruction) || localeData.en.welcome.instruction;
      var galleryHref = ".." + (localeData[lang].gallery ? route : '') + "/gallery/";
      var linkPattern = /\[([^\]]+)\]\(\/gallery\)/g;
      instructionText.split('\n').forEach(function (line, lineIndex) {
        if (lineIndex > 0) {
          instructionEl.appendChild(document.createElement('br'));
        }
        var lastIndex = 0;
        var match;
        linkPattern.lastIndex = 0;
        while ((match = linkPattern.exec(line)) !== null) {
          if (match.index > lastIndex) {
            instructionEl.appendChild(document.createTextNode(line.slice(lastIndex, match.index)));
          }
          var link = document.createElement('a');
          link.href = galleryHref;
          link.style.color = '#1b77ff';
          link.textContent = match[1];
          instructionEl.appendChild(link);
          lastIndex = linkPattern.lastIndex;
        }
        if (lastIndex < line.length) {
          instructionEl.appendChild(document.createTextNode(line.slice(lastIndex)));
        }
      });

      document.getElementById("welcome_loading").textContent = (localeData[lang].welcome && localeData[lang].welcome.loading) || localeData.en.welcome.loading;
      
      if (location.hash) {
        document.getElementById("welcome_loading").style.display = '';
        document.getElementById("welcome_instruction").style.display = 'none';
      }
  
    </script>

    <!-- Inline CSS for Spinner Animation -->
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* Match app link UX before the bundle loads (inline styles on the <a> cannot set hover). */
      #welcome_instruction a {
        text-decoration: none;
        text-underline-offset: 2px;
      }
      #welcome_instruction a:hover,
      #welcome_instruction a:focus-visible {
        text-decoration: underline;
      }
    </style>
    
    <!-- Temporary toolbar for loading -->
    <div id="toolbar-loading" style="position: absolute; left: 0; top: 0; width: 100%; height: 68px; background-color: rgba(255,255,255,0.88);">
      <div style="position: absolute; left: 50%; top: 34px; transform: translate(-50%, -50%);">
        <!-- Loading Spinner -->
        <div style="border: 4px solid rgba(0, 0, 0, 0.1); border-top: 4px solid gray; border-radius: 50%; width: 26px; height: 26px; animation: spin 1s linear infinite; box-sizing: border-box;"></div>
      </div>
    </div>

    <!-- The main Vue app -->
    <div id="vue-root" style="position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column;"></div>

  </body>
</html>
